services:
  api:
    environment:
      NODE_ENV: staging
      REDIS_ENABLED: "true"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-core:6379
      QUEUE_REDIS_URL: redis://:${REDIS_PASSWORD}@redis-queue:6379
      REDIS_PREFIX: saas-staging
    depends_on:
      redis-core:
        condition: service_healthy
      redis-queue:
        condition: service_healthy

  redis-core:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--maxmemory",
        "${REDIS_CORE_MAXMEMORY:-512mb}",
        "--maxmemory-policy",
        "${REDIS_CORE_MAXMEMORY_POLICY:-volatile-ttl}",
        "--save",
        "900 1",
        "--save",
        "300 10",
        "--save",
        "60 10000"
      ]
    ports: []
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--maxmemory",
        "${REDIS_QUEUE_MAXMEMORY:-1gb}",
        "--maxmemory-policy",
        "${REDIS_QUEUE_MAXMEMORY_POLICY:-noeviction}",
        "--save",
        "900 1",
        "--save",
        "300 10",
        "--save",
        "60 10000"
      ]
    ports: []
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
