services:
  api:
    build: .
    container_name: saas_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/saas
      REDIS_ENABLED: "true"
      REDIS_URL: redis://:${REDIS_PASSWORD:-saas-dev-redis}@redis-core:6379
      QUEUE_REDIS_URL: redis://:${REDIS_PASSWORD:-saas-dev-redis}@redis-queue:6379
      REDIS_PREFIX: ${REDIS_PREFIX:-saas}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-5000}
      REDIS_MAX_RETRIES_PER_REQUEST: ${REDIS_MAX_RETRIES_PER_REQUEST:-2}
      REDIS_RETRY_BASE_DELAY_MS: ${REDIS_RETRY_BASE_DELAY_MS:-100}
      REDIS_RETRY_MAX_DELAY_MS: ${REDIS_RETRY_MAX_DELAY_MS:-5000}
      REDIS_CIRCUIT_BREAKER_FAILURE_THRESHOLD: ${REDIS_CIRCUIT_BREAKER_FAILURE_THRESHOLD:-5}
      REDIS_CIRCUIT_BREAKER_COOLDOWN_MS: ${REDIS_CIRCUIT_BREAKER_COOLDOWN_MS:-30000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      EMAIL_FROM: ${EMAIL_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY}
    depends_on:
      mongo:
        condition: service_healthy
      redis-core:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    volumes:
      - logs:/app/logs
    networks:
      - backend

  mongo:
    image: mongo:7
    container_name: saas_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-core:
    image: redis:7-alpine
    container_name: saas_redis_core
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:-saas-dev-redis}",
        "--maxmemory",
        "${REDIS_CORE_MAXMEMORY:-512mb}",
        "--maxmemory-policy",
        "${REDIS_CORE_MAXMEMORY_POLICY:-volatile-ttl}",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--save",
        "900 1",
        "--save",
        "300 10",
        "--save",
        "60 10000"
      ]
    volumes:
      - redis_core_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-saas-dev-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - backend

  redis-queue:
    image: redis:7-alpine
    container_name: saas_redis_queue
    restart: unless-stopped
    ports:
      - "6380:6379"
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD:-saas-dev-redis}",
        "--maxmemory",
        "${REDIS_QUEUE_MAXMEMORY:-1gb}",
        "--maxmemory-policy",
        "${REDIS_QUEUE_MAXMEMORY_POLICY:-noeviction}",
        "--appendonly",
        "yes",
        "--appendfsync",
        "everysec",
        "--save",
        "900 1",
        "--save",
        "300 10",
        "--save",
        "60 10000"
      ]
    volumes:
      - redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-saas-dev-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - backend

volumes:
  mongo_data:
  redis_core_data:
  redis_queue_data:
  logs:

networks:
  backend:
    name: saas_backend
    driver: bridge
